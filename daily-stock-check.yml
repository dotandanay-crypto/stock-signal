name: Daily Stock Signal Check

on:
  schedule:
    - cron: '0 13 * * *'  # Every day at 15:00 Israel time (UTC+2)
  workflow_dispatch:        # Allow manual trigger

jobs:
  check-signals:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger stock signal check
        run: |
          echo "Checking stock market signals..."
          curl "${{ secrets.STOCK_BACKEND_URL }}/check" \
            --max-time 30 \
            --silent
          echo "Done!"
